services:
  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"   # Neo4j Browser
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/skillmap_dev
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      # Uses Docker internal service DNS — NOT localhost
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: skillmap_dev

  # One-shot service: runs Cypher constraints/indexes once after Neo4j is healthy
  neo4j-init:
    image: neo4j:5
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./scripts/init-db.cypher:/init-db.cypher:ro
    command: >
      bash -c "/var/lib/neo4j/bin/cypher-shell
        -a bolt://neo4j:7687
        -u neo4j
        -p skillmap_dev
        -f /init-db.cypher
        && echo 'Neo4j schema initialized'"
    restart: on-failure

volumes:
  neo4j_data:
